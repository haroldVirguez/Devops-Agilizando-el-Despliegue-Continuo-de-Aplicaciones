services:
  api:
    build: .
    container_name: blacklist-api
    env_file:
      - path: .env.docker
        required: false
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@your-rds-endpoint:5432/blacklist_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    restart: unless-stopped
